<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ACWA PULSE — Global Portfolio Connected</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<style>
  :root{
    --bg-0:#01030b;
    --bg-1:#050a1c;
    --bg-2:#0a1230;
    --panel:rgba(10,18,48,0.55);
    --panel-brd:rgba(120,140,220,0.18);
    --text:#e8ecff;
    --text-dim:#a9b3d6;
    --renewable:#2D7FF9;
    --water:#26D9FF;
    --conventional:#8B5CF6;
    --hq:#B47CFF;
    --glow:#8b5cf6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg-0);color:var(--text);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    overflow:hidden;height:100vh;width:100vw}

  .stars{position:fixed;inset:0;background:
      radial-gradient(ellipse at 60% 40%, #0a1230 0%, #04081a 45%, #01030b 100%);
      overflow:hidden;z-index:0}
  .stars::before,.stars::after{
    content:"";position:absolute;inset:-50%;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.9), transparent 50%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,.7), transparent 50%),
      radial-gradient(1.5px 1.5px at 40% 60%, rgba(200,220,255,.8), transparent 50%),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,.6), transparent 50%),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,.7), transparent 50%),
      radial-gradient(1.5px 1.5px at 55% 25%, rgba(180,200,255,.6), transparent 50%),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,.5), transparent 50%),
      radial-gradient(1px 1px at 30% 90%, rgba(255,255,255,.7), transparent 50%);
    background-size: 800px 800px;
    animation: drift 120s linear infinite;
    opacity:.7;
  }
  .stars::after{background-size:600px 600px;animation-duration:180s;opacity:.4}
  @keyframes drift{from{transform:translate(0,0)}to{transform:translate(-400px,-400px)}}

  #stage{position:relative;width:100vw;height:100vh;z-index:1}
  svg#globe{position:absolute;inset:0;width:100%;height:100%;cursor:grab}
  svg#globe:active{cursor:grabbing}

  /* ========== HEADER (with logo image) — smaller, cleaner ==========
     Sized so the logo + tagline never crowd the panels below. */
  .header{position:absolute;top:clamp(14px, 1.8vh, 26px);left:clamp(18px, 2vw, 40px);
    z-index:5;pointer-events:none;
    display:flex;flex-direction:column;align-items:flex-start;
    width:clamp(160px, 12vw, 210px)}
  .header .brand-logo{
    display:block;
    width:clamp(110px, 8.5vw, 150px);   /* ~40% smaller than before */
    height:auto;
    filter:drop-shadow(0 0 22px rgba(180,124,255,.55));
  }
  .header .tagline{
    font-size:clamp(9.5px, 0.72vw, 11.5px);
    font-weight:700;letter-spacing:2px;color:#c9d0ee;
    margin-top:8px;text-align:center;
    width:clamp(110px, 8.5vw, 150px);
    text-shadow:0 0 10px rgba(180,124,255,.35);
    white-space:nowrap;
  }
  .header .summary{margin-top:clamp(10px, 1.4vh, 18px);
    font-size:clamp(11px, 0.85vw, 13.5px);line-height:1.55;color:#c8d0f0;
    width:clamp(210px, 18vw, 300px)}
  .header .summary strong{color:#fff}

  /* ========== SIDE PANELS — now on the RIGHT side ========== */
 /* ========== SIDE PANELS — bigger, in the lower center-right ========== */
.left-panels{position:absolute;
  right:clamp(22px, 2.4vw, 48px);
  top:auto;
  bottom:clamp(160px, 19vh, 240px);
  z-index:5;
  display:flex;flex-direction:column;gap:clamp(14px, 1.8vh, 22px);
  width:clamp(240px, 20vw, 310px)            /* wider */
}
.panel{background:var(--panel);border:1px solid var(--panel-brd);border-radius:14px;
  padding:clamp(16px, 1.4vw, 22px) clamp(18px, 1.6vw, 24px);   /* more padding */
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 8px 30px rgba(0,0,0,.35)
}
.panel h4{margin:0 0 16px 0;font-size:clamp(12px, 0.95vw, 15px);   /* bigger heading */
  letter-spacing:2.8px;color:#c9d0ee;font-weight:800
}

/* Technology legend */
.legend-row{display:flex;align-items:center;gap:14px;margin:12px 0;
  font-size:clamp(13px, 1vw, 16px)
}
.legend-dot{width:32px;height:32px;border-radius:50%;              /* bigger dot */
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0
}
.legend-dot svg{width:17px;height:17px;fill:#fff}                  /* bigger icon */
.legend-text b{font-weight:800;font-size:clamp(13px, 1vw, 16px)}

/* Portfolio Snapshot rows */
.snap-row{display:flex;align-items:center;gap:16px;margin:14px 0;
  font-size:clamp(13px, 1vw, 16px)
}
.snap-ico{width:34px;height:34px;display:inline-flex;              /* bigger icon */
  align-items:center;justify-content:center;color:#c9d0ee
}
.snap-ico svg{width:30px;height:30px}                              /* svg fills it */
.snap-num{font-size:clamp(24px, 1.9vw, 30px);font-weight:800;      /* bigger number */
  line-height:1;color:#fff
}
.snap-lbl{font-size:clamp(12px, 0.9vw, 14.5px);color:var(--text-dim);
  letter-spacing:1px
}
.snap-sub{font-size:clamp(11px, 0.85vw, 13.5px);color:#B47CFF;
  font-weight:700;letter-spacing:1.2px;margin-top:2px
}

  /* ========== HQ CARD ========== */
  .hq-card{position:absolute;right:clamp(18px, 2vw, 40px);bottom:clamp(18px, 3vh, 36px);
    z-index:5;background:var(--panel);border:1px solid var(--panel-brd);
    border-radius:14px;padding:clamp(11px, 1.1vw, 18px) clamp(16px, 1.4vw, 24px);
    backdrop-filter:blur(10px);display:flex;align-items:center;
    gap:clamp(10px, 1vw, 15px);min-width:clamp(230px, 20vw, 300px);
    box-shadow:0 8px 30px rgba(0,0,0,.35)}
  .hq-pin{width:clamp(28px, 2.4vw, 38px);height:clamp(28px, 2.4vw, 38px);
    color:#B47CFF;filter:drop-shadow(0 0 8px rgba(180,124,255,.7))}
  .hq-info b{display:block;font-size:clamp(12px, 1vw, 15px);
    letter-spacing:1.5px;color:#B47CFF}
  .hq-info .coord{font-size:clamp(10.5px, 0.85vw, 13px);color:#dee3f7;margin-top:2px}
  .hq-info .sub{font-size:clamp(9px, 0.75vw, 11.5px);letter-spacing:2px;
    color:#B47CFF;margin-top:2px}

  /* ========== HINT ========== */
  .hint{position:absolute;
  bottom:clamp(16px, 2.4vh, 32px);           /* stays at the bottom */
  right:clamp(18px, 2vw, 40px);              /* aligned to the right edge */
  z-index:5;font-size:clamp(10.5px, 0.8vw, 12.5px);
  color:var(--text-dim);letter-spacing:1px;
  background:var(--panel);border:1px solid var(--panel-brd);
  border-radius:10px;padding:8px 16px;backdrop-filter:blur(10px);
  white-space:nowrap}
  .hint b{color:#fff}

  /* ========== LABELS ========== */
  #labels{position:absolute;inset:0;z-index:4;pointer-events:none}

  .country-label{
    position:absolute;
    background:rgba(6,10,26,0.92);
    border:1px solid rgba(180,124,255,.45);
    border-radius:10px;
    padding:9px 13px;
    font-size:clamp(10.5px, 0.85vw, 12.5px);
    line-height:1.35;
    pointer-events:auto;cursor:pointer;user-select:none;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    max-width:clamp(220px, 20vw, 280px);
    box-shadow:0 12px 34px rgba(0,0,0,.7), 0 0 26px rgba(180,124,255,.45);
    display:none;
    transform-origin:center;
    animation: cardPop .25s ease-out;
  }
  @keyframes cardPop{
    from{ opacity:0; transform: translate(0,0) scale(0.85); }
    to  { opacity:1; transform: translate(0,0) scale(1);    }
  }
  .country-label.show{ display:block; }
  .country-label .cname{font-weight:800;font-size:clamp(11px, 0.9vw, 13px);
    letter-spacing:2px;margin-bottom:6px;color:#fff}
  .country-label .close{position:absolute;top:6px;right:8px;width:18px;height:18px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:#c9d0ee;font-size:14px;line-height:1;background:rgba(255,255,255,0.06);
    cursor:pointer}
  .country-label .close:hover{color:#fff;background:rgba(255,255,255,0.15)}
  .country-label ul{margin:0;padding:0;list-style:none}
  .country-label li{display:flex;align-items:center;gap:6px;
    font-size:clamp(10px, 0.8vw, 12px);color:#dee3f7;padding:1px 0}
  .country-label li::before{content:"";width:6px;height:6px;border-radius:50%;
    background:var(--dotc,#2D7FF9);flex-shrink:0;
    box-shadow:0 0 6px var(--dotc,#2D7FF9)}
  .country-label.sa{max-width:clamp(420px, 38vw, 560px)}
  .country-label.sa ul{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px 18px}
  .country-label.sa li{font-size:clamp(9.5px, 0.75vw, 11.5px)}

  /* ========== HQ label at Riyadh ========== */
  .hq-label{position:absolute;z-index:4;pointer-events:none;text-align:center;
    transform:translate(-50%,-50%);opacity:0;transition:opacity .5s ease}
  .hq-label.visible{opacity:1}
  .hq-label .ring{width:clamp(56px, 5vw, 78px);height:clamp(56px, 5vw, 78px);
    border-radius:50%;border:2px solid #B47CFF;
    box-shadow:0 0 30px rgba(180,124,255,.7),inset 0 0 20px rgba(180,124,255,.25);
    display:flex;align-items:center;justify-content:center;margin:0 auto 6px auto;
    animation:hqpulse 2.4s ease-in-out infinite;
    background:radial-gradient(circle,rgba(139,92,246,.25) 0%,rgba(139,92,246,0) 70%)}
  .hq-label .ring svg{width:clamp(24px, 2.2vw, 34px);height:clamp(24px, 2.2vw, 34px);
    color:#fff;filter:drop-shadow(0 0 6px #B47CFF)}
  @keyframes hqpulse{
    0%,100%{box-shadow:0 0 30px rgba(180,124,255,.7),inset 0 0 20px rgba(180,124,255,.25);transform:scale(1)}
    50%{box-shadow:0 0 55px rgba(180,124,255,1),inset 0 0 25px rgba(180,124,255,.4);transform:scale(1.06)}
  }
  .hq-label .hqname{font-weight:900;font-size:clamp(12px, 1vw, 15px);
    letter-spacing:2px;color:#fff;text-shadow:0 0 10px rgba(180,124,255,.7)}
  .hq-label .hqcoord{font-size:clamp(9.5px, 0.75vw, 11px);color:#c9d0ee;
    margin-top:2px;letter-spacing:.5px}

  /* Dot cursor */
  g.pt{ cursor:pointer; }
  g.pt circle.dot{ transition: r .15s ease; }
  g.pt:hover circle.dot{ r: 5.5; }

  /* City lights twinkle */
  @keyframes cityTwinkle {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1;    }
  }
  circle.city-light-core,
  circle.city-light-mid,
  circle.city-light-halo{
    animation: cityTwinkle 3.2s ease-in-out infinite;
    will-change: opacity;
  }
  circle.city-light-mid { animation-duration: 2.7s; }
  circle.city-light-halo{ animation-duration: 4.1s; }
</style>
</head>

/* -------- GLOBE SETUP -------- */
const svg   = d3.select("#globe");
const labels= d3.select("#labels");

let width, height, scale;
const projection = d3.geoOrthographic().clipAngle(90);
const path = d3.geoPath(projection);

function resize(){
  width  = window.innerWidth;
  height = window.innerHeight;
  scale  = Math.min(width, height) * 0.42;
  svg.attr("viewBox",`0 0 ${width} ${height}`);
  projection.scale(scale).translate([width/2, height/2]);
}
resize();

projection.rotate([-HQ.lon, -HQ.lat + 5]);

const defs = svg.append("defs");

const oceanGrad = defs.append("radialGradient").attr("id","oceanGrad").attr("cx","35%").attr("cy","30%");
oceanGrad.append("stop").attr("offset","0%").attr("stop-color","#0a2050");
oceanGrad.append("stop").attr("offset","55%").attr("stop-color","#050f30");
oceanGrad.append("stop").attr("offset","100%").attr("stop-color","#010818");

const atmosGrad = defs.append("radialGradient").attr("id","atmosGrad").attr("cx","50%").attr("cy","50%");
atmosGrad.append("stop").attr("offset","70%").attr("stop-color","rgba(64,120,255,0)");
atmosGrad.append("stop").attr("offset","95%").attr("stop-color","rgba(80,140,255,0.35)");
atmosGrad.append("stop").attr("offset","100%").attr("stop-color","rgba(120,180,255,0)");

["R","W","C"].forEach(t=>{
  const g = defs.append("linearGradient").attr("id","arc-"+t).attr("gradientUnits","userSpaceOnUse");
  g.append("stop").attr("offset","0%").attr("stop-color","#B47CFF").attr("stop-opacity",1);
  g.append("stop").attr("offset","100%").attr("stop-color",TECH_COLOR[t]).attr("stop-opacity",.95);
});

const glowFilter = defs.append("filter").attr("id","glow").attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%");
glowFilter.append("feGaussianBlur").attr("stdDeviation","3").attr("result","b");
const gm = glowFilter.append("feMerge");
gm.append("feMergeNode").attr("in","b");
gm.append("feMergeNode").attr("in","SourceGraphic");

const cityGlow = defs.append("filter").attr("id","cityGlow").attr("x","-100%").attr("y","-100%").attr("width","300%").attr("height","300%");
cityGlow.append("feGaussianBlur").attr("stdDeviation","2.4").attr("result","b");
const cm = cityGlow.append("feMerge");
cm.append("feMergeNode").attr("in","b");
cm.append("feMergeNode").attr("in","SourceGraphic");

const gAtmos    = svg.append("g");
const gGlobe    = svg.append("g");
const gGraticule= svg.append("g");

const gLights   = svg.append("g");
const gArcs     = svg.append("g");

gAtmos.append("circle").attr("cx",width/2).attr("cy",height/2).attr("r",scale*1.12).attr("fill","url(#atmosGrad)");

const graticule = d3.geoGraticule10();
gGraticule.append("path").datum(graticule).attr("d",path).attr("fill","none").attr("stroke","rgba(80,120,220,.10)").attr("stroke-width",.5);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json").then(world=>{
  const countries = topojson.feature(world, world.objects.countries).features;
  gCountries.selectAll("path").data(countries).join("path").attr("d",path).attr("fill","rgba(30,60,140,.35)").attr("stroke","rgba(120,160,240,.25)").attr("stroke-width",.4);
  drawEverything();
  startAnimation();
});

function greatCircleArc(a, b, segments=64){
  const coords=[];
  for(let i=0;i<=segments;i++){
    const t=i/segments;
    coords.push(d3.geoInterpolate([a.lon,a.lat],[b.lon,b.lat])(t));
  }
  return {type:"LineString", coordinates:coords};
}

let arcData=[];

function drawEverything(){
  gArcs.selectAll("*").remove();
  gPoints.selectAll("*").remove();
  gLights.selectAll("*").remove();

  const lightGroups = gLights.selectAll("g.city").data(CITY_LIGHTS).join("g").attr("class","city");
  lightGroups.append("circle").attr("class","city-light-halo").attr("r", d => d[2] * 4.2).attr("fill", "rgba(255,190,100,0.09)").style("animation-delay", (d,i)=>`-${(i*0.29)%4.1}s`);
  lightGroups.append("circle").attr("class","city-light-mid").attr("r", d => d[2] * 1.9).attr("fill", "rgba(255,215,140,0.30)").style("animation-delay", (d,i)=>`-${(i*0.17)%2.7}s`);
  lightGroups.append("circle").attr("class","city-light-core").attr("r", d => d[2] * 0.75).attr("fill", "rgba(255,240,210,0.95)").attr("filter","url(#cityGlow)").style("animation-delay", (d,i)=>`-${(i*0.11)%3.2}s`);

  arcData = COUNTRIES.filter(c => c.code !== "KSA").map(c => ({
    country:c, geo:greatCircleArc(HQ, c), color: dominantColor(c)
  }));

  gArcs.selectAll("path.arc-base").data(arcData).join("path").attr("class","arc-base").attr("d", d=>path(d.geo)).attr("fill","none").attr("stroke", d=>d.color).attr("stroke-width",1.1).attr("stroke-opacity",.35).attr("stroke-linecap","round");
  gArcs.selectAll("path.arc-anim").data(arcData).join("path").attr("class","arc-anim").attr("d", d=>path(d.geo)).attr("fill","none").attr("stroke", d=>d.color).attr("stroke-width",2.2).attr("stroke-linecap","round").attr("filter","url(#glow)").attr("stroke-dasharray","0 2000");

  const pts = gPoints.selectAll("g.pt").data(COUNTRIES).join("g").attr("class","pt");
  pts.append("circle").attr("class","halo").attr("r", d=>d.code==="KSA"?12:8).attr("fill","none").attr("stroke", d=>d.code==="KSA"?"#B47CFF":dominantColor(d)).attr("stroke-width",1.5).attr("opacity",.6);
  pts.append("circle").attr("class","dot").attr("r", d=>d.code==="KSA"?5:3.5).attr("fill", d=>d.code==="KSA"?"#B47CFF":dominantColor(d)).attr("filter","url(#glow)");

  pts.on("click", function(event, d){
    event.stopPropagation();
    showCard(d.code);
  })
  .on("touchend", function(event, d){
    event.stopPropagation();
    event.preventDefault();
    showCard(d.code);
  });

  updatePositions();
}

function dominantColor(c){
  const tally={R:0,W:0,C:0};
  c.plants.forEach(p=>tally[p.t]++);
  const top=Object.entries(tally).sort((a,b)=>b[1]-a[1])[0][0];
  return TECH_COLOR[top];
}

function isVisible(lon,lat){
  const r = projection.rotate();
  const λ = (lon + r[0]) * Math.PI/180;
  const φ = lat * Math.PI/180;
  const φ0= -r[1] * Math.PI/180;
  const cosC = Math.sin(φ0)*Math.sin(φ) + Math.cos(φ0)*Math.cos(φ)*Math.cos(λ);
  return cosC > 0.05;
}

function updatePositions(){
  gGraticule.selectAll("path").attr("d",path);
  gCountries.selectAll("path").attr("d",path);
  gGlobe.selectAll("path").attr("d",path);
  gArcs.selectAll("path.arc-base").attr("d",d=>path(d.geo));
  gArcs.selectAll("path.arc-anim").attr("d",d=>path(d.geo)).each(function(d){ d._len = this.getTotalLength(); });
  gPoints.selectAll("g.pt").each(function(d){
    const p = projection([d.lon,d.lat]);
    const visible = isVisible(d.lon,d.lat) && p;
    d3.select(this).attr("transform", p?`translate(${p[0]},${p[1]})`:null).style("display", visible?null:"none");
  });
  gLights.selectAll("g.city").each(function(d){
    const p = projection([d[1], d[0]]);
    const visible = isVisible(d[1], d[0]) && p;
    d3.select(this).attr("transform", p?`translate(${p[0]},${p[1]})`:null).style("display", visible?null:"none");
  });
  updateHQLabel();
  positionActiveCard();
}

/* -------- HQ LABEL -------- */
labels.selectAll("*").remove();

const hqEl = document.createElement("div");
hqEl.className = "hq-label";
hqEl.innerHTML = `
  <div class="ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 21V9l8-6 8 6v12"/><path d="M9 21v-6h6v6"/></svg>
  </div>
  <div class="hqname">ACWA HQ<br/>RIYADH</div>
  <div class="hqcoord">24.8143° N, 46.7262° E</div>`;
document.getElementById("labels").appendChild(hqEl);

function updateHQLabel(){
  const hqp = projection([HQ.lon, HQ.lat]);
  const hqVisible = isVisible(HQ.lon,HQ.lat);
  if(hqp && hqVisible){
    hqEl.style.left = hqp[0]+"px";
    hqEl.style.top  = hqp[1]+"px";
    hqEl.classList.add("visible");
  } else hqEl.classList.remove("visible");
}

/* -------- COUNTRY CARDS -------- */
const countryEls = {};
COUNTRIES.forEach(c=>{
  const el = document.createElement("div");
  el.className = "country-label" + (c.code === "KSA" ? " sa" : "");
  const items = c.plants.map(p=>`<li style="--dotc:${TECH_COLOR[p.t]}">${p.n}</li>`).join("");
  el.innerHTML = `<div class="close" title="Close">×</div><div class="cname">${c.name}</div><ul>${items}</ul>`;
  document.getElementById("labels").appendChild(el);
  countryEls[c.code] = el;
  el.addEventListener("click", (e)=>{ e.stopPropagation(); });
  el.querySelector(".close").addEventListener("click", (e)=>{
    e.stopPropagation();
    hideActiveCard();
  });
});

let activeCode = null;

function showCard(code){
  if (activeCode === code){ hideActiveCard(); return; }
  hideActiveCard();
  const el = countryEls[code];
  if (!el) return;
  activeCode = code;
  el.classList.add("show");
  el.style.animation = "none";
  void el.offsetWidth;
  el.style.animation = "";
  positionActiveCard();
}

function hideActiveCard(){
  if (activeCode){
    const el = countryEls[activeCode];
    if (el) el.classList.remove("show");
    activeCode = null;
  }
}

function positionActiveCard(){
  if (!activeCode) return;
  const c  = COUNTRIES.find(x=>x.code === activeCode);
  const el = countryEls[activeCode];
  if (!c || !el) return;
  const p  = projection([c.lon, c.lat]);
  const vis= isVisible(c.lon, c.lat);
  if (!p || !vis){ hideActiveCard(); return; }

  const w = el.offsetWidth  || 220;
  const h = el.offsetHeight || 90;
  const cx = width/2, cy = height/2;

  let lx, ly;
  if (c.code === "KSA"){
    lx = p[0] - w/2;
    ly = p[1] + 60;
  } else {
    const dx = p[0]-cx, dy = p[1]-cy;
    const len= Math.hypot(dx,dy) || 1;
    const off= 22;
    lx = p[0] + (dx/len)*off;
    ly = p[1] + (dy/len)*off;
    if (dx <  0) lx -= w;
    if (dy <  0) ly -= h;
  }

  if (lx < 8) lx = 8;
  if (lx + w > width - 8) lx = width - 8 - w;
  if (ly < 8) ly = 8;
  if (ly + h > height - 8) ly = height - 8 - h;

  el.style.left = lx + "px";
  el.style.top  = ly + "px";
}

svg.on("click", (event)=>{
  if (!event.target.closest("g.pt")){ hideActiveCard(); }
});

/* -------- INTERACTIONS -------- */
let autoRotate = true;
let dragging = false;

const drag = d3.drag()
  .on("start",()=>{ dragging=true; autoRotate=false; })
  .on("drag",(ev)=>{
    const r = projection.rotate();
    const k = 0.35;
    projection.rotate([r[0]+ev.dx*k, Math.max(-70, Math.min(70, r[1]-ev.dy*k)), r[2]]);
    updatePositions();
  })
  .on("end",()=>{ dragging=false; });

svg.call(drag);

svg.on("wheel",(ev)=>{
  ev.preventDefault();
  const factor = ev.deltaY < 0 ? 1.08 : 0.92;
  const cur = projection.scale();
  const next= Math.max(scale*0.7, Math.min(scale*2.4, cur*factor));
  projection.scale(next);
  updatePositions();
},{passive:false});

window.addEventListener("resize",()=>{
  resize();
  gAtmos.select("circle").attr("cx",width/2).attr("cy",height/2).attr("r",scale*1.12);
  updatePositions();
});

/* -------- ANIMATIONS -------- */
function startAnimation(){
  let last = performance.now();
  function tick(now){
    const dt = now-last; last=now;
    if(autoRotate){
      const r = projection.rotate();
      projection.rotate([r[0]+dt*0.008, r[1], r[2]]);
      updatePositions();
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  const paths = gArcs.selectAll("path.arc-anim").nodes();
  const durations = paths.map(()=> 2200 + Math.random()*1800);

  function animatePulses(){
    paths.forEach((p,i)=>{
      const total = p.getTotalLength();
      const dashLen = Math.max(30, total*0.18);
      p.setAttribute("stroke-dasharray", `${dashLen} ${total}`);
      p.style.transition = "none";
      p.setAttribute("stroke-dashoffset", total);
      void p.getBoundingClientRect();
      p.style.transition = `stroke-dashoffset ${durations[i]}ms linear`;
      p.setAttribute("stroke-dashoffset", -dashLen);
    });
  }
  animatePulses();
  setInterval(animatePulses, 3500);
}
</script>
