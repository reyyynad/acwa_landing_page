<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ACWA PULSE — Global Portfolio Connected</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="stars"></div>

<div id="stage">
  <svg id="globe"></svg>
  <div id="labels"></div>
</div>

<!-- Data file: edit this to add/remove countries and plants -->
<script src="data.js"></script>
<script>

/* =============================================================================
   RENDERING CODE — Don't edit unless you know what you're doing.
   All data is in data.js. All styling is in styles.css.
   ============================================================================= */

/* Apply CONFIG values to the HTML (summary text + snapshot numbers) */
(function applyConfig(){
  try {
    var sum = document.querySelector(".header .summary");
    if (sum && typeof CONFIG !== "undefined" && CONFIG.headerSummary){
      sum.innerHTML = CONFIG.headerSummary;
    }
    if (typeof CONFIG !== "undefined" && CONFIG.snapshot){
      var nums = document.querySelectorAll(".snap-row .snap-num");
      if (nums.length >= 3){
        nums[0].textContent = CONFIG.snapshot.totalAssets;
        nums[1].textContent = CONFIG.snapshot.countries;
        nums[2].textContent = CONFIG.snapshot.regions;
      }
    }
  } catch (e) {}
})();

/* -------- DATA -------- */


/* -------- GLOBE SETUP -------- */
const svg   = d3.select("#globe");
const labels= d3.select("#labels");

let width, height, scale;
const projection = d3.geoOrthographic().clipAngle(90);
const path = d3.geoPath(projection);

function resize(){
  width  = window.innerWidth;
  height = window.innerHeight;
  scale  = Math.min(width, height) * 0.42;
  svg.attr("viewBox",`0 0 ${width} ${height}`);
  projection.scale(scale).translate([width/2, height/2]);
}
resize();

projection.rotate([-HQ.lon, -HQ.lat + 5]);

const defs = svg.append("defs");

const oceanGrad = defs.append("radialGradient").attr("id","oceanGrad").attr("cx","35%").attr("cy","30%");
oceanGrad.append("stop").attr("offset","0%").attr("stop-color","#0a2050");
oceanGrad.append("stop").attr("offset","55%").attr("stop-color","#050f30");
oceanGrad.append("stop").attr("offset","100%").attr("stop-color","#010818");

const atmosGrad = defs.append("radialGradient").attr("id","atmosGrad").attr("cx","50%").attr("cy","50%");
atmosGrad.append("stop").attr("offset","70%").attr("stop-color","rgba(64,120,255,0)");
atmosGrad.append("stop").attr("offset","95%").attr("stop-color","rgba(80,140,255,0.35)");
atmosGrad.append("stop").attr("offset","100%").attr("stop-color","rgba(120,180,255,0)");

["R","W","C"].forEach(t=>{
  const g = defs.append("linearGradient").attr("id","arc-"+t).attr("gradientUnits","userSpaceOnUse");
  g.append("stop").attr("offset","0%").attr("stop-color","#B47CFF").attr("stop-opacity",1);
  g.append("stop").attr("offset","100%").attr("stop-color",TECH_COLOR[t]).attr("stop-opacity",.95);
});

const glowFilter = defs.append("filter").attr("id","glow").attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%");
glowFilter.append("feGaussianBlur").attr("stdDeviation","3").attr("result","b");
const gm = glowFilter.append("feMerge");
gm.append("feMergeNode").attr("in","b");
gm.append("feMergeNode").attr("in","SourceGraphic");

const cityGlow = defs.append("filter").attr("id","cityGlow").attr("x","-100%").attr("y","-100%").attr("width","300%").attr("height","300%");
cityGlow.append("feGaussianBlur").attr("stdDeviation","2.4").attr("result","b");
const cm = cityGlow.append("feMerge");
cm.append("feMergeNode").attr("in","b");
cm.append("feMergeNode").attr("in","SourceGraphic");

const gAtmos    = svg.append("g");
const gGlobe    = svg.append("g");
const gShadow   = svg.append("g");  /* day/night terminator overlay */
const gGraticule= svg.append("g");
const gCountries= svg.append("g");
const gLights   = svg.append("g");
const gArcs     = svg.append("g");
const gPoints   = svg.append("g");

gAtmos.append("circle").attr("cx",width/2).attr("cy",height/2).attr("r",scale*1.12).attr("fill","url(#atmosGrad)");
gGlobe.append("path").datum({type:"Sphere"}).attr("d",path).attr("fill","url(#oceanGrad)").attr("stroke","rgba(100,150,255,.35)").attr("stroke-width",.8);
const graticule = d3.geoGraticule10();
gGraticule.append("path").datum(graticule).attr("d",path).attr("fill","none").attr("stroke","rgba(80,120,220,.10)").attr("stroke-width",.5);

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json").then(world=>{
  const countries = topojson.feature(world, world.objects.countries).features;
  gCountries.selectAll("path").data(countries).join("path").attr("d",path).attr("fill","rgba(30,60,140,.35)").attr("stroke","rgba(120,160,240,.25)").attr("stroke-width",.4);
  drawEverything();
  startAnimation();
});

function greatCircleArc(a, b, segments=64){
  const coords=[];
  for(let i=0;i<=segments;i++){
    const t=i/segments;
    coords.push(d3.geoInterpolate([a.lon,a.lat],[b.lon,b.lat])(t));
  }
  return {type:"LineString", coordinates:coords};
}

let arcData=[];

function drawEverything(){
  gArcs.selectAll("*").remove();
  gPoints.selectAll("*").remove();
  gLights.selectAll("*").remove();

  const lightGroups = gLights.selectAll("g.city").data(CITY_LIGHTS).join("g").attr("class","city");
  lightGroups.append("circle").attr("class","city-light-halo").attr("r", d => d[2] * 4.2).attr("fill", "rgba(255,190,100,0.09)").style("animation-delay", (d,i)=>`-${(i*0.29)%4.1}s`);
  lightGroups.append("circle").attr("class","city-light-mid").attr("r", d => d[2] * 1.9).attr("fill", "rgba(255,215,140,0.30)").style("animation-delay", (d,i)=>`-${(i*0.17)%2.7}s`);
  lightGroups.append("circle").attr("class","city-light-core").attr("r", d => d[2] * 0.75).attr("fill", "rgba(255,240,210,0.95)").attr("filter","url(#cityGlow)").style("animation-delay", (d,i)=>`-${(i*0.11)%3.2}s`);

  arcData = COUNTRIES.filter(c => c.code !== "KSA").map(c => ({
    country:c, geo:greatCircleArc(HQ, c), color: dominantColor(c)
  }));

 gArcs.selectAll("path.arc-base").data(arcData).join("path").attr("class","arc-base").attr("d", d=>path(d.geo)).attr("fill","none").attr("stroke","#2D7FF9").attr("stroke-width",1.1).attr("stroke-opacity",.35).attr("stroke-linecap","round");
gArcs.selectAll("path.arc-anim").data(arcData).join("path").attr("class","arc-anim").attr("d", d=>path(d.geo)).attr("fill","none").attr("stroke","#2D7FF9").attr("stroke-width",2.2).attr("stroke-linecap","round").attr("filter","url(#glow)").attr("stroke-dasharray","0 2000");

const pts = gPoints.selectAll("g.pt").data(COUNTRIES).join("g").attr("class","pt");
pts.append("circle").attr("class","halo").attr("r", d=>d.code==="KSA"?0:8).attr("fill","none").attr("stroke","#2D7FF9").attr("stroke-width",1.5).attr("opacity",.6);
pts.append("circle").attr("class","dot").attr("r", d=>d.code==="KSA"?0:3.5).attr("fill","#2D7FF9").attr("filter","url(#glow)");
/* Invisible click-target for Saudi Arabia (behind the house ring) */
pts.append("circle").attr("class","hitbox")
   .attr("r", d=>d.code==="KSA"?28:0)
   .attr("fill","transparent")
   .style("cursor","pointer");

  pts.on("click", function(event, d){
    event.stopPropagation();
    showCard(d.code);
  })
  .on("touchend", function(event, d){
    event.stopPropagation();
    event.preventDefault();
    showCard(d.code);
  });

  updatePositions();
}

function dominantColor(c){
  const tally={R:0,W:0,C:0};
  c.plants.forEach(p=>tally[p.t]++);
  const top=Object.entries(tally).sort((a,b)=>b[1]-a[1])[0][0];
  return TECH_COLOR[top];
}

function isVisible(lon,lat){
  const r = projection.rotate();
  const λ = (lon + r[0]) * Math.PI/180;
  const φ = lat * Math.PI/180;
  const φ0= -r[1] * Math.PI/180;
  const cosC = Math.sin(φ0)*Math.sin(φ) + Math.cos(φ0)*Math.cos(φ)*Math.cos(λ);
  return cosC > 0.05;
}

/* ==================== DAY / NIGHT TERMINATOR ====================
   The night side is drawn as a d3.geoCircle of radius 90° centered on the
   antipode of the sun. Updates in real time based on UTC. */

/* Move gShadow so it sits ABOVE the countries layer but BELOW the city lights
   (this way land is darkened on the night side while city lights stay bright). */
gShadow.node().parentNode.insertBefore(gShadow.node(), gLights.node());

/* Two shading shapes:
   - Day side: a very soft warm brightening overlay
   - Night side: a stronger cool darkening overlay
   Both are 90° d3.geoCircles that stick to the sphere as it rotates. */
const dayPath = gShadow.append("path")
  .attr("class","day-side")
  .attr("fill","rgba(255,235,180,0.10)")
  .attr("pointer-events","none");

const nightPath = gShadow.append("path")
  .attr("class","night-side")
  .attr("fill","rgba(0,4,20,0.55)")
  .attr("pointer-events","none");

/* Sub-solar point calculator (where the sun is directly overhead). */
function getSunSubpoint(){
  const now = new Date();
  const utcH = now.getUTCHours() + now.getUTCMinutes()/60 + now.getUTCSeconds()/3600;
  // Approx day-of-year
  const yearStart = Date.UTC(now.getUTCFullYear(), 0, 0);
  const dayOfYear = Math.floor((now - yearStart) / 86400000);
  // Solar declination (Cooper's approximation, degrees)
  const decl = 23.44 * Math.sin(2 * Math.PI * (284 + dayOfYear) / 365);
  // Sub-solar longitude: sun over 0° at 12:00 UTC, moves -15° per hour
  let lng = -15 * (utcH - 12);
  while (lng > 180)  lng -= 360;
  while (lng < -180) lng += 360;
  return { lat: decl, lng: lng };
}

/* Convert lat/lng to a text name of the nearest country/region (rough). */
function sunRegion(lat, lng){
  const regs = [
    {n:"Pacific Ocean",  ln:[-180,-100], la:[-90,90]},
    {n:"North America",  ln:[-140,-50],  la:[10,80]},
    {n:"South America",  ln:[-90,-30],   la:[-60,10]},
    {n:"Atlantic Ocean", ln:[-50,-10],   la:[-60,60]},
    {n:"North Atlantic", ln:[-30,-5],    la:[40,80]},
    {n:"Europe",         ln:[-10,40],    la:[35,72]},
    {n:"North Africa",   ln:[-15,35],    la:[10,35]},
    {n:"Sub-Saharan Africa", ln:[-20,50], la:[-35,10]},
    {n:"Middle East",    ln:[35,60],     la:[12,42]},
    {n:"Indian Ocean",   ln:[45,100],    la:[-40,10]},
    {n:"Central Asia",   ln:[50,90],     la:[30,55]},
    {n:"South Asia",     ln:[60,95],     la:[5,35]},
    {n:"East Asia",      ln:[95,145],    la:[20,55]},
    {n:"Southeast Asia", ln:[95,140],    la:[-11,20]},
    {n:"Oceania",        ln:[110,180],   la:[-50,-10]},
    {n:"North Pacific",  ln:[140,180],   la:[20,70]},
  ];
  for (const r of regs){
    if (lng >= r.ln[0] && lng <= r.ln[1] && lat >= r.la[0] && lat <= r.la[1]) return r.n;
  }
  return "the open ocean";
}

/* Draw the day-side (lightening) and night-side (darkening) hemispheres. */
function updateShadow(){
  const sun = getSunSubpoint();
  // Day hemisphere is a 90° circle centered on the sub-solar point
  const dayGeo = d3.geoCircle().center([sun.lng, sun.lat]).radius(90)();
  dayPath.attr("d", path(dayGeo));
  // Night hemisphere = 90° circle centered on the antipode of the sun
  const antiLng = sun.lng > 0 ? sun.lng - 180 : sun.lng + 180;
  const antiLat = -sun.lat;
  const nightGeo = d3.geoCircle().center([antiLng, antiLat]).radius(90)();
  nightPath.attr("d", path(nightGeo));
}

/* UTC date only — refreshes once per minute. Shadow refreshes every minute too. */
function updateUTCClock(){
  const now = new Date();
  const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
  const dstr  = `${String(now.getUTCDate()).padStart(2,"0")} ${months[now.getUTCMonth()]} ${now.getUTCFullYear()}`;
  const de = document.getElementById("utcDateValue");
  if (de) de.textContent = dstr;
}
updateUTCClock();
setInterval(() => { updateUTCClock(); updateShadow(); }, 60000);
/* =============================================================== */

function updatePositions(){
  gGraticule.selectAll("path").attr("d",path);
  gCountries.selectAll("path").attr("d",path);
  gGlobe.selectAll("path").attr("d",path);
  updateShadow();   /* keep day/night terminator aligned with rotation */
  gArcs.selectAll("path.arc-base").attr("d",d=>path(d.geo));
  gArcs.selectAll("path.arc-anim").attr("d",d=>path(d.geo)).each(function(d){ d._len = this.getTotalLength(); });
  gPoints.selectAll("g.pt").each(function(d){
    const p = projection([d.lon,d.lat]);
    const visible = isVisible(d.lon,d.lat) && p;
    d3.select(this).attr("transform", p?`translate(${p[0]},${p[1]})`:null).style("display", visible?null:"none");
  });
  /* City lights show ONLY on the night side of the globe (based on UTC sun position). */
  const sun = getSunSubpoint();
  const sunLatRad = sun.lat * Math.PI / 180;
  const sinSun = Math.sin(sunLatRad);
  const cosSun = Math.cos(sunLatRad);
  gLights.selectAll("g.city").each(function(d){
    const lat = d[0], lng = d[1];
    const p = projection([lng, lat]);
    const onHemisphere = isVisible(lng, lat) && p;
    // Day/night check: cosine of angular distance from the sub-solar point
    // > 0 → daytime (hide the light);  <= 0 → nighttime (show the light)
    const latRad = lat * Math.PI / 180;
    const dlng   = (lng - sun.lng) * Math.PI / 180;
    const cosDist = Math.sin(latRad)*sinSun + Math.cos(latRad)*cosSun*Math.cos(dlng);
    const isNight = cosDist < 0.05;   // small buffer so the terminator zone still glows softly
    const show = onHemisphere && isNight;
    d3.select(this)
      .attr("transform", p ? `translate(${p[0]},${p[1]})` : null)
      .style("display", show ? null : "none");
  });
  updateHQLabel();
  positionActiveCard();
}

/* -------- HQ LABEL -------- */
labels.selectAll("*").remove();

const hqEl = document.createElement("div");
hqEl.className = "hq-label";
hqEl.style.pointerEvents = "auto";
hqEl.style.cursor = "pointer";
hqEl.innerHTML = `
  <div class="ring">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 21V9l8-6 8 6v12"/><path d="M9 21v-6h6v6"/></svg>
  </div>
  <div class="hqname">ACWA HQ<br/>RIYADH</div>
  <div class="hqcoord">24.8143° N, 46.7262° E</div>`;
hqEl.addEventListener("click", (e) => {
  e.stopPropagation();
  showCard("KSA");
});
hqEl.addEventListener("touchend", (e) => {
  e.stopPropagation();
  e.preventDefault();
  showCard("KSA");
});
document.getElementById("labels").appendChild(hqEl);

function updateHQLabel(){
  const hqp = projection([HQ.lon, HQ.lat]);
  const hqVisible = isVisible(HQ.lon,HQ.lat);
  if(hqp && hqVisible){
    hqEl.style.left = hqp[0]+"px";
    hqEl.style.top  = hqp[1]+"px";
    hqEl.classList.add("visible");
  } else hqEl.classList.remove("visible");
}

/* -------- COUNTRY CARDS -------- */
const countryEls = {};
COUNTRIES.forEach(c=>{
  const el = document.createElement("div");
  el.className = "country-label" + (c.code === "KSA" ? " sa" : "");
  const items = c.plants.map(p=>`<li style="--dotc:${TECH_COLOR[p.t]}">${p.n}</li>`).join("");
  el.innerHTML = `<div class="close" title="Close">×</div><div class="cname">${c.name}</div><ul>${items}</ul>`;
  document.getElementById("labels").appendChild(el);
  countryEls[c.code] = el;
  el.addEventListener("click", (e)=>{ e.stopPropagation(); });
  el.querySelector(".close").addEventListener("click", (e)=>{
    e.stopPropagation();
    hideActiveCard();
  });
});

let activeCode = null;

function showCard(code){
  if (activeCode === code){ hideActiveCard(); return; }
  hideActiveCard();
  const el = countryEls[code];
  if (!el) return;
  activeCode = code;
  el.classList.add("show");
  el.style.animation = "none";
  void el.offsetWidth;
  el.style.animation = "";
  positionActiveCard();
}

function hideActiveCard(){
  if (activeCode){
    const el = countryEls[activeCode];
    if (el) el.classList.remove("show");
    activeCode = null;
  }
}

function positionActiveCard(){
  if (!activeCode) return;
  const c  = COUNTRIES.find(x=>x.code === activeCode);
  const el = countryEls[activeCode];
  if (!c || !el) return;
  const p  = projection([c.lon, c.lat]);
  const vis= isVisible(c.lon, c.lat);
  if (!p || !vis){ hideActiveCard(); return; }

  const w = el.offsetWidth  || 220;
  const h = el.offsetHeight || 90;
  const cx = width/2, cy = height/2;

  let lx, ly;
  if (c.code === "KSA"){
    lx = p[0] - w/2;
    ly = p[1] + 60;
  } else {
    const dx = p[0]-cx, dy = p[1]-cy;
    const len= Math.hypot(dx,dy) || 1;
    const off= 22;
    lx = p[0] + (dx/len)*off;
    ly = p[1] + (dy/len)*off;
    if (dx <  0) lx -= w;
    if (dy <  0) ly -= h;
  }

  if (lx < 8) lx = 8;
  if (lx + w > width - 8) lx = width - 8 - w;
  if (ly < 8) ly = 8;
  if (ly + h > height - 8) ly = height - 8 - h;

  el.style.left = lx + "px";
  el.style.top  = ly + "px";
}

svg.on("click", (event)=>{
  if (!event.target.closest("g.pt")){ hideActiveCard(); }
});

/* -------- INTERACTIONS -------- */
let autoRotate = true;
let dragging = false;

const drag = d3.drag()
  .on("start",()=>{ dragging=true; autoRotate=false; })
  .on("drag",(ev)=>{
    const r = projection.rotate();
    const k = 0.35;
    projection.rotate([r[0]+ev.dx*k, Math.max(-70, Math.min(70, r[1]-ev.dy*k)), r[2]]);
    updatePositions();
  })
  .on("end",()=>{ dragging=false; });

svg.call(drag);

svg.on("wheel",(ev)=>{
  ev.preventDefault();
  const factor = ev.deltaY < 0 ? 1.08 : 0.92;
  const cur = projection.scale();
  const next= Math.max(scale*0.7, Math.min(scale*2.4, cur*factor));
  projection.scale(next);
  updatePositions();
},{passive:false});

window.addEventListener("resize",()=>{
  resize();
  gAtmos.select("circle").attr("cx",width/2).attr("cy",height/2).attr("r",scale*1.12);
  updatePositions();
});

/* -------- ANIMATIONS -------- */
function startAnimation(){
  let last = performance.now();
  function tick(now){
    const dt = now-last; last=now;
    if(autoRotate){
      const r = projection.rotate();
      projection.rotate([r[0]+dt*0.008, r[1], r[2]]);
      updatePositions();
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  const paths = gArcs.selectAll("path.arc-anim").nodes();
  const durations = paths.map(()=> 2200 + Math.random()*1800);

  function animatePulses(){
    paths.forEach((p,i)=>{
      const total = p.getTotalLength();
      const dashLen = Math.max(30, total*0.18);
      p.setAttribute("stroke-dasharray", `${dashLen} ${total}`);
      p.style.transition = "none";
      p.setAttribute("stroke-dashoffset", total);
      void p.getBoundingClientRect();
      p.style.transition = `stroke-dashoffset ${durations[i]}ms linear`;
      p.setAttribute("stroke-dashoffset", -dashLen);
    });
  }
  animatePulses();
  setInterval(animatePulses, 3500);
}
</script>
</body>
</html>
